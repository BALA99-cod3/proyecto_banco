<ion-header>
  <ion-toolbar color="primary">
    <ion-title class="page-title">👥 Clientes</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Buscar cliente..."
      (ionInput)="search($event)"
      animated>
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content color="light">
  <ion-refresher slot="fixed" (ionRefresh)="load($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list style="margin:8px; border-radius:12px; overflow:hidden;" lines="inset">
    <ion-item-sliding *ngFor="let c of filtered">
      <ion-item>
        <ion-icon name="person-outline" slot="start" color="primary" style="font-size:28px;"></ion-icon>
        <ion-label>
          <h2 style="font-weight:600;">{{ c.nombre }}</h2>
          <p>{{ c.email }}</p>
          <p>{{ c.telefono || 'Sin teléfono' }}</p>
        </ion-label>
        <ion-badge slot="end" color="light" style="color:var(--ion-color-primary);">
          {{ c.Cuentas?.length || 0 }} ctas.
        </ion-badge>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="openModal(c)">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="delete(c.id)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>

    <ion-item *ngIf="filtered.length === 0">
      <ion-label class="ion-text-center" color="medium" style="padding:24px;">
        Sin clientes registrados
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="openModal()">
      <ion-icon name="add-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Modal Formulario -->
  <ion-modal [isOpen]="isModalOpen" (didDismiss)="isModalOpen=false">
    <ng-template>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>{{ isEditing ? 'Editar' : 'Nuevo' }} Cliente</ion-title>
          <ion-buttons slot="end">
            <ion-button fill="clear" color="light" (click)="isModalOpen=false">Cerrar</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item style="margin-bottom:12px;">
          <ion-label position="floating">Nombre completo *</ion-label>
          <ion-input [(ngModel)]="form.nombre" autocomplete="name"></ion-input>
        </ion-item>
        <ion-item style="margin-bottom:12px;">
          <ion-label position="floating">Email *</ion-label>
          <ion-input type="email" [(ngModel)]="form.email" autocomplete="email"></ion-input>
        </ion-item>
        <ion-item style="margin-bottom:24px;">
          <ion-label position="floating">Teléfono</ion-label>
          <ion-input type="tel" [(ngModel)]="form.telefono"></ion-input>
        </ion-item>
        <ion-button expand="block" size="large" (click)="save()">
          {{ isEditing ? 'Actualizar' : 'Crear Cliente' }}
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
