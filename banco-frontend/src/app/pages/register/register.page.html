<ion-content color="light">
  <div class="register-container">
    <ion-card class="register-card">
      <ion-card-header style="text-align:center; padding:32px 16px 16px;">
        <div style="font-size:64px; line-height:1; margin-bottom:12px;">👤</div>
        <ion-card-title style="font-size:1.4rem; font-weight:800; color:var(--ion-color-primary);">
          Crear Cuenta
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item style="margin-bottom:8px;">
          <ion-label position="floating">Nombre completo *</ion-label>
          <ion-input [(ngModel)]="nombre"></ion-input>
        </ion-item>

        <ion-item style="margin-bottom:8px;">
          <ion-label position="floating">Correo electrónico *</ion-label>
          <ion-input type="email" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-item style="margin-bottom:8px;">
          <ion-label position="floating">Teléfono (opcional)</ion-label>
          <ion-input type="tel" [(ngModel)]="telefono"></ion-input>
        </ion-item>

        <ion-item style="margin-bottom:8px;">
          <ion-label position="floating">Contraseña * (mín. 6 caracteres)</ion-label>
          <ion-input type="password" [(ngModel)]="password"></ion-input>
        </ion-item>

        <ion-item style="margin-bottom:24px;">
          <ion-label position="floating">Confirmar contraseña *</ion-label>
          <ion-input type="password" [(ngModel)]="confirmPassword"></ion-input>
        </ion-item>

        <ion-button expand="block" size="large" (click)="onRegister()">
          <ion-icon slot="start" name="person-add-outline"></ion-icon>
          Registrarse
        </ion-button>

        <ion-button expand="block" fill="clear" style="margin-top:8px;" (click)="goLogin()">
          <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
          Volver al login
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>

<style>
.register-container {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:16px;
}
.register-card { width:100%; max-width:440px; margin:0 auto; }
</style>
